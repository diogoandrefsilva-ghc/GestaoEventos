<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f2ea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eventos">
<title>GestãoEventos</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f5f2ea; --surface:#ffffff; --surface2:#efeadd; --border:#e3ddcd;
    --text:#2b2a2e; --dim:#6f6a5f; --faint:#a39c8b;
    --gold:#c2902e; --gold-soft:#f4ecd6;
    --vem:#2f9e63; --vem-soft:#e2f2e8;
    --nao:#d8584d; --nao-soft:#fbe6e2;
    --pend:#8a8578; --pend-soft:#ede8db;
    --r:14px; --r-sm:10px;
    --pad: max(env(safe-area-inset-bottom), 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:Inter,system-ui,-apple-system,sans-serif;
    font-size:15px; line-height:1.45; min-height:100vh;
    -webkit-font-smoothing:antialiased; touch-action:manipulation;
    -webkit-text-size-adjust:100%; text-size-adjust:100%;
  }
  h1,h2,h3{margin:0; font-family:Fraunces,Georgia,serif; font-weight:600; letter-spacing:-0.01em;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,select,textarea{font-family:inherit; font-size:16px;}
  ::selection{background:var(--gold); color:#15161f;}

  header{
    position:sticky; top:0; z-index:50;
    background:rgba(245,242,234,.86); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  }
  .hrow{display:flex; align-items:center; gap:10px; max-width:760px; margin:0 auto;}
  .brand{display:flex; align-items:baseline; gap:8px; font-family:Fraunces,serif; font-size:21px; font-weight:600;}
  .brand .dot{color:var(--gold);}
  .hspace{flex:1;}
  .icon-btn{
    width:38px; height:38px; border-radius:11px; display:grid; place-items:center;
    background:var(--surface); border:1px solid var(--border); font-size:17px;
    transition:background .15s, border-color .15s;
  }
  .icon-btn:hover{background:var(--surface2);}
  .lock{
    max-width:760px; margin:8px auto 0; display:flex; align-items:center; gap:8px;
    font-size:12.5px; color:var(--gold); background:var(--gold-soft);
    border:1px solid #e6d29a; border-radius:9px; padding:7px 11px;
  }

  nav.tabs{
    max-width:760px; margin:0 auto; padding:14px 16px 0; display:flex; gap:6px;
  }
  .tab{
    flex:1; padding:9px 0; border-radius:10px; font-size:13.5px; font-weight:600;
    color:var(--dim); background:transparent; border:1px solid transparent; transition:all .15s;
  }
  .tab.active{color:var(--text); background:var(--surface); border-color:var(--border);}

  main{max-width:760px; margin:0 auto; padding:16px 16px 120px;}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:15px 16px; margin-bottom:11px; transition:border-color .15s, transform .08s;
  }
  .card.tap:active{transform:scale(.992);}
  .ev-top{display:flex; align-items:center; gap:11px;}
  .ev-emoji{
    width:42px; height:42px; flex:none; border-radius:11px; display:grid; place-items:center;
    font-size:20px; background:var(--surface2); border:1px solid var(--border);
  }
  .ev-name{font-family:Fraunces,serif; font-size:18px; font-weight:600; line-height:1.2;}
  .ev-meta{font-size:12.5px; color:var(--dim); margin-top:2px;}
  .ev-tally{display:flex; gap:14px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border);}
  .tly{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--dim);}
  .tly b{font-family:Inter; font-weight:700; font-variant-numeric:tabular-nums; font-size:15px;}
  .pip{width:8px; height:8px; border-radius:50%; flex:none;}
  .pip.v{background:var(--vem);} .pip.n{background:var(--nao);} .pip.p{background:var(--pend);}

  .back{display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:600; color:var(--dim); padding:8px 0;}
  .ficha-head{display:flex; align-items:flex-start; gap:12px; margin:4px 0 6px;}
  .ficha-head .ev-emoji{width:50px; height:50px; font-size:24px;}
  .ficha-title{flex:1; min-width:0;}
  .ficha-title h1{font-size:25px; line-height:1.12;}
  .ficha-title .ev-meta{margin-top:5px; font-size:13px;}
  .ficha-actions{display:flex; gap:7px;}
  .mini-btn{width:34px; height:34px; border-radius:9px; background:var(--surface); border:1px solid var(--border); display:grid; place-items:center; font-size:15px;}

  .dash{
    background:linear-gradient(160deg,var(--surface2),var(--surface));
    border:1px solid var(--border); border-radius:var(--r);
    padding:18px; margin:12px 0 18px; display:flex; gap:18px; align-items:center;
  }
  .donut-wrap{position:relative; width:128px; height:128px; flex:none;}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;}
  .donut-center .num{font-family:Fraunces,serif; font-size:40px; font-weight:600; line-height:1; color:var(--gold);}
  .donut-center .lbl{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-top:3px;}
  .dash-stats{flex:1; min-width:0; display:flex; flex-direction:column; gap:9px;}
  .stat{display:flex; align-items:center; gap:9px; font-size:13.5px; width:100%; text-align:left; padding:5px 7px; margin:-2px 0; border-radius:9px; border:1px solid transparent; background:transparent; transition:background .12s, border-color .12s;}
  .stat:active{transform:scale(.99);}
  .stat.active{background:var(--surface);}
  .stat.active.v{border-color:color-mix(in srgb,var(--vem) 55%,transparent);}
  .stat.active.n{border-color:color-mix(in srgb,var(--nao) 55%,transparent);}
  .stat.active.p{border-color:var(--border);}
  .chev{color:var(--faint); font-size:22px; line-height:1; flex:none; margin-left:4px;}
  .stat .pip{width:9px; height:9px;}
  .stat .stxt{flex:1; color:var(--dim);}
  .stat .sval{font-weight:700; font-variant-numeric:tabular-nums; font-size:15px;}
  .ac-split{display:flex; gap:9px; margin-top:3px;}
  .ac-chip{flex:1; background:var(--vem-soft); border:1px solid #bfe0cc; border-radius:10px; padding:8px 10px; text-align:center;}
  .ac-chip .n{font-family:Fraunces,serif; font-size:21px; font-weight:600; color:var(--vem);}
  .ac-chip .t{font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--dim); margin-top:1px;}

  .fam{background:var(--surface); border:1px solid var(--border); border-radius:var(--r); margin-bottom:11px; overflow:hidden;}
  .fam-head{display:flex; align-items:center; gap:10px; padding:10px 13px; border-bottom:1px solid var(--border);}
  .fam-name{flex:1; font-weight:600; font-size:15px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fam-quick{display:flex; gap:5px; flex:none;}
  .qbtn{width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); display:grid; place-items:center; font-size:13px; font-weight:700;}
  .qbtn.v{color:var(--vem);} .qbtn.n{color:var(--nao);} .qbtn.p{color:var(--faint);}
  .qbtn:active{transform:scale(.9);}
  .member{display:flex; align-items:center; gap:10px; padding:8px 13px;}
  .member + .member{border-top:1px solid var(--border);}
  .member.is-vem{background:color-mix(in srgb,var(--vem) 9%,transparent);}
  .member.is-vem .m-name{color:var(--vem); font-weight:600;}
  .member.is-nao .m-name{color:var(--nao);}
  .member.is-nc{opacity:.5;}
  .member.is-nc .m-name{color:var(--faint); text-decoration:line-through; text-decoration-color:var(--border);}
  .m-name{flex:1; min-width:0; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .m-name .kid{font-size:11px; color:var(--faint); margin-left:6px; vertical-align:1px;}
  .seg{display:flex; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:2px; flex:none;}
  .seg button{padding:5px 0; width:31px; border-radius:7px; font-size:13px; font-weight:700; color:var(--faint); transition:all .12s;}
  .seg button.on.v{background:var(--vem-soft); color:var(--vem);}
  .seg button.on.n{background:var(--nao-soft); color:var(--nao);}
  .seg button.on.p{background:var(--pend-soft); color:var(--dim);}
  .seg button.on.nc{background:var(--surface2); color:var(--faint);}

  .fam-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px 15px; margin-bottom:11px;}
  .fam-card-head{display:flex; align-items:center; gap:10px; margin-bottom:2px;}
  .fam-card-head h3{font-size:16px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .mlist{display:flex; flex-wrap:wrap; gap:7px; margin-top:11px;}
  .mtag{display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:5px 11px 5px 12px; font-size:13px;}
  .mtag .x{color:var(--faint); font-weight:700; padding:0 2px;}
  .mtag.kid{border-style:dashed;}
  .add-m{display:inline-flex; align-items:center; gap:5px; background:transparent; border:1px dashed var(--border); border-radius:99px; padding:5px 12px; font-size:13px; color:var(--gold); font-weight:600;}

  /* grupos */
  .gwrap{display:flex; flex-wrap:wrap; gap:7px; align-items:center;}
  .gchip{display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:99px; font-size:12.5px; font-weight:600; color:var(--gc,#7aa2f7); background:transparent; border:1px solid var(--gc,#7aa2f7); opacity:.5; transition:opacity .12s, background .12s, transform .08s;}
  .gchip.on{opacity:1; background:color-mix(in srgb, var(--gc,#7aa2f7) 16%, transparent);}
  .gchip.ro{opacity:1; padding:4px 11px; font-size:11.5px; background:color-mix(in srgb, var(--gc,#7aa2f7) 14%, transparent);}
  .gchip.ro.tap:active{transform:scale(.94);}
  .gchip.neutral{--gc:#6b7195;}
  .gchip.dimmed{opacity:.28!important;}
  .group-header{padding:18px 2px 8px; display:flex; align-items:center;}
  .group-header:first-child{padding-top:4px;}
  .fam-card.minha,.fam.minha{border-color:var(--gold); border-width:1.5px;}
  .swatches{display:flex; gap:9px; flex-wrap:wrap;}
  .swatch{width:36px; height:36px; border-radius:10px; border:2px solid transparent;}
  .swatch.on{border-color:#fff;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:11px 16px; border-radius:11px; font-weight:600; font-size:14.5px; background:var(--gold); color:#15161f; border:1px solid var(--gold);}
  .btn.ghost{background:transparent; color:var(--text); border-color:var(--border);}
  .btn.danger{background:transparent; color:var(--nao); border-color:#5a2a26;}
  .btn:active{transform:scale(.98);}
  .empty{text-align:center; padding:54px 22px; color:var(--dim);}
  .empty .big{font-size:42px; margin-bottom:10px;}
  .empty h2{font-size:20px; color:var(--text); margin-bottom:6px;}
  .empty p{font-size:14px; margin:0 0 18px; line-height:1.5;}
  .section-lbl{font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:600; margin:4px 2px 12px;}

  .fab{
    position:fixed; right:18px; bottom:calc(18px + var(--pad)); z-index:45;
    width:56px; height:56px; border-radius:18px; background:var(--gold); color:#15161f;
    font-size:28px; font-weight:600; display:grid; place-items:center;
    box-shadow:0 8px 22px rgba(60,50,20,.22), 0 0 0 1px rgba(194,144,46,.35);
  }
  .fab:active{transform:scale(.94);}

  .scrim{position:fixed; inset:0; z-index:60; background:rgba(40,38,32,.42); backdrop-filter:blur(2px); display:none; align-items:flex-end; justify-content:center;}
  .scrim.open{display:flex;}
  .sheet{
    width:100%; max-width:760px; background:var(--surface); border:1px solid var(--border);
    border-radius:20px 20px 0 0; padding:18px 18px calc(20px + var(--pad));
    max-height:90vh; overflow-y:auto; animation:rise .2s ease;
  }
  @keyframes rise{from{transform:translateY(14px); opacity:.6;} to{transform:none; opacity:1;}}
  .grip{width:38px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 14px;}
  .sheet h2{font-size:20px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; color:var(--dim); margin-bottom:6px; font-weight:500;}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; background:var(--bg); border:1px solid var(--border);
    border-radius:11px; color:var(--text); -webkit-appearance:none; appearance:none;
    min-width:0; max-width:100%; box-sizing:border-box;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--gold); outline-offset:0;}
  .field textarea{resize:vertical; min-height:60px;}
  .row2{display:flex; gap:10px;}
  .row2 > *{flex:1; min-width:0;}
  .typegrid{display:grid; grid-template-columns:repeat(5,1fr); gap:7px;}
  .typeopt{padding:10px 0; border-radius:11px; background:var(--bg); border:1px solid var(--border); text-align:center; font-size:11px; color:var(--dim);}
  .typeopt .e{font-size:20px; display:block; margin-bottom:3px;}
  .typeopt.on{border-color:var(--gold); background:var(--gold-soft); color:var(--text);}
  .toggle2{display:flex; background:var(--bg); border:1px solid var(--border); border-radius:11px; padding:3px;}
  .toggle2 button{flex:1; padding:9px 0; border-radius:8px; font-size:13.5px; font-weight:600; color:var(--dim);}
  .toggle2 button.on{background:var(--surface2); color:var(--text);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}
  .sheet-actions .btn{flex:1;}
  .hint{font-size:12px; color:var(--faint); margin-top:8px; line-height:1.5;}

  #toast{
    position:fixed; left:50%; bottom:calc(26px + var(--pad)); transform:translateX(-50%) translateY(20px);
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:11px 18px; border-radius:12px; font-size:13.5px; z-index:80; opacity:0;
    transition:opacity .2s, transform .2s; pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,.4); max-width:90vw;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}

  /* ===== round 2 + Supabase ===== */
  .ficha-title h1{font-size:20px; line-height:1.15;}
  .fam-card{padding:10px 14px; margin-bottom:8px;}
  .fam-card-head{margin-bottom:0;}
  .group-header{padding:12px 2px 6px;}
  .fc-count{font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums;}
  .chev{margin-left:2px;}
  .fam-dot{width:9px; height:9px; border-radius:50%; flex:none;}

  /* dashboard reformulado */
  .dash{display:flex; flex-direction:column; gap:11px; padding:14px; align-items:stretch;}
  .dash-row3{display:flex; gap:9px; align-items:stretch;}
  .dcell{flex:1; background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:10px 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; transition:border-color .12s, background .12s;}
  .dcell:active{transform:scale(.98);}
  .dcell.active{border-color:var(--gold); background:var(--gold-soft);}
  .dcell .n{font-family:Fraunces,serif; font-size:23px; font-weight:600; color:var(--vem); line-height:1;}
  .dcell .t{font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--dim);}
  .donut-cell{padding:6px;}
  .donut-cell.active{border-color:var(--vem); background:var(--vem-soft);}
  .donut-wrap{width:92px; height:92px;}
  .donut-center .num{font-size:27px;}
  .donut-center .lbl{font-size:9px; margin-top:1px;}
  .dash-row2{display:flex; gap:9px;}
  .dbtn{flex:1; display:flex; align-items:center; justify-content:center; gap:7px; background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:10px 8px; font-size:12.5px; color:var(--dim); transition:border-color .12s, background .12s;}
  .dbtn .pip{width:8px; height:8px;}
  .dbtn b{color:var(--text); font-variant-numeric:tabular-nums; font-size:14px;}
  .dbtn:active{transform:scale(.98);}
  .dbtn.n.active{border-color:var(--nao); background:var(--nao-soft); color:var(--text);}
  .dbtn.p.active{border-color:var(--pend); background:var(--pend-soft); color:var(--text);}

  /* botões nunca mostram cursor de texto (bug iOS do cursor perdido) */
  button{caret-color:transparent;}

  /* não convidadas */
  .qbtn.nc{color:var(--faint);}
  .nc-sep{height:1px; background:var(--border); margin:22px 0 0;}
  .nc-toggle{display:flex; align-items:center; gap:9px; width:100%; padding:13px 4px; color:var(--dim); font-size:12.5px; font-weight:600; letter-spacing:.02em; background:transparent;}
  .nc-count{background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:1px 9px; font-size:12px; font-variant-numeric:tabular-nums; color:var(--dim);}
  .nc-chev{margin-left:auto; color:var(--faint); font-size:20px; line-height:1; transition:transform .15s;}
  .nc-chev.open{transform:rotate(90deg);}
  .nc-list{margin-top:4px; display:flex; flex-direction:column; gap:8px;}
  .nc-list .fam{opacity:.92;}
  .nc-fam .fam-head{border-bottom:none; cursor:pointer;}
  .nc-fam.open .fam-head{border-bottom:1px solid var(--border);}
  .nc-fam .fam-name .nc-count{margin-left:6px; vertical-align:middle;}
  .nc-fam .add-m{flex:none;}
  .ncf-body{display:flex; flex-direction:column;}
  .ncf-membro{display:flex; align-items:center; gap:10px; padding:8px 12px 8px 24px; border-top:1px solid var(--border);}
  .ncf-membro:first-child{border-top:none;}
  .ncf-membro .m-name{flex:1; min-width:0; color:var(--dim); font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* admin */
  .badge{position:absolute; top:-5px; right:-5px; min-width:17px; height:17px; padding:0 4px; border-radius:9px; background:var(--nao); color:#fff; font-size:10px; font-weight:700; display:grid; place-items:center; line-height:1;}
  .adm-row{display:flex; align-items:center; gap:8px; padding:9px 11px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin-bottom:7px;}
  .adm-email{flex:1; font-size:13px; word-break:break-all;}

  /* autenticação */
  .auth-page{position:fixed; inset:0; z-index:90; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; padding:34px 22px; text-align:center;}
  .auth-page.show{display:flex;}
  .auth-page h2{font-family:Fraunces,serif; font-size:30px; margin-bottom:8px;}
  .auth-brand-dot{color:var(--gold);}
  .auth-sub{color:var(--dim); font-size:14px; max-width:340px; margin:0 auto 22px; line-height:1.5;}
  .auth-card{width:100%; max-width:340px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:11px;}
  .auth-btn{display:flex; align-items:center; justify-content:center; gap:9px; padding:12px 16px; border-radius:12px; font-weight:600; font-size:15px; border:1px solid var(--border); background:var(--surface2); color:var(--text);}
  .auth-btn.google{background:#fff; border-color:#dadce0; color:#3c4043;}
  .auth-btn.prim{background:var(--gold); border-color:var(--gold); color:#2b2a2e;}
  .auth-btn.ghost{background:transparent; color:var(--dim); border-color:transparent;}
  .auth-btn:active{transform:scale(.98);}
  .auth-status{font-size:13px; color:var(--dim); min-height:18px;}

  /* eventos: linhas condensadas + cabeçalho por grupo */
  .group-header.ge-evt{padding:15px 2px 6px;}
  .group-header.ge-evt:first-of-type{padding-top:4px;}
  .fam{margin-bottom:9px;}
  .fam-head{padding:7px 12px;}

<script>
/* =========================================================================
   GestãoEventos — single-file. Dados em GitHub: AppDataJSON/gestaoeventos-data.json
   Sync igual ao Expenses-Acc/SplitBill: leitura Contents API autenticada (SHA),
   escrita serializada (_writeChain) + _writePending a travar o auto-reload,
   ge_dirty a travar o auto-pull, token em localStorage SEMPRE fora dos dados.
   ========================================================================= */

const SB_URL='https://gjweqwfbnkgnibhajldc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqd2Vxd2ZibmtnbmliaGFqbGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk4NzUsImV4cCI6MjA5NjY4NTg3NX0.h6st-RayGhQdsqH7E2Ko-rPWk2QZUpTevO6cbjvlSnk';
const SB_SCHEMA='gestaoeventos';
const ADMIN_EMAIL='diogo.andre.f.silva@gmail.com';
const SESSION_KEY='gestaoeventos_sb_session';
let _sbSession=null, _refreshing=null;

function sbHeaders(extra={}){
  return Object.assign({
    'Content-Type':'application/json',
    'apikey':SB_KEY,
    'Authorization':`Bearer ${_sbSession?.access_token||SB_KEY}`,
    'Accept-Profile':SB_SCHEMA,
    'Content-Profile':SB_SCHEMA
  }, extra);
}
function sbSaveSession(s){ _sbSession=s; try{localStorage.setItem(SESSION_KEY,JSON.stringify(s));}catch(_){} }
function tokenQuaseExpirado(){ if(!_sbSession) return false; if(!_sbSession.expires_at) return true; return (_sbSession.expires_at-Date.now()/1000)<120; }
async function sbRefresh(){
  if(!_sbSession||!_sbSession.refresh_token) return false;
  if(_refreshing) return _refreshing;
  _refreshing=(async()=>{
    try{
      const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:_sbSession.refresh_token})});
      if(!r.ok) return false;
      const d=await r.json();
      sbSaveSession({access_token:d.access_token, refresh_token:d.refresh_token||_sbSession.refresh_token, expires_at:d.expires_at||Math.floor(Date.now()/1000)+(d.expires_in||3600), user:d.user||_sbSession.user});
      return true;
    }catch(e){ return false; }
  })();
  const ok=await _refreshing; _refreshing=null; return ok;
}
async function sbEnsureFresh(){ if(_sbSession&&_sbSession.refresh_token&&tokenQuaseExpirado()) await sbRefresh(); }
async function sbFetch(url,opt){
  await sbEnsureFresh(); opt=opt||{};
  opt.headers=Object.assign({},opt.headers,{'Authorization':`Bearer ${_sbSession?.access_token||SB_KEY}`});
  let r=await fetch(url,opt);
  if(r.status===401&&_sbSession&&_sbSession.refresh_token&&await sbRefresh()){
    opt.headers['Authorization']=`Bearer ${_sbSession.access_token}`; r=await fetch(url,opt);
  }
  return r;
}
async function sbReq(method,path,body,extra){
  const opt={method,headers:sbHeaders(extra||{})};
  if(body!==undefined) opt.body=JSON.stringify(body);
  const r=await sbFetch(`${SB_URL}/rest/v1/${path}`,opt);
  if(!r.ok){let m='HTTP '+r.status;try{const j=await r.json();m=j.message||m;}catch(_){ } throw new Error(m);}
  const tx=await r.text(); return tx?JSON.parse(tx):null;
}
function isAdmin(){ return !!_sbSession&&_sbSession.user&&_sbSession.user.email===ADMIN_EMAIL; }
setInterval(()=>{ sbEnsureFresh(); }, 10*60*1000);

const TIPOS={
  almoco:{e:'🍴',l:'Almoço'}, jantar:{e:'🍷',l:'Jantar'},
  aniversario:{e:'🎂',l:'Aniversário'}, festa:{e:'🎉',l:'Festa'}, outro:{e:'📅',l:'Outro'}
};
const GRUPO_CORES=['#7aa2f7','#bb9af7','#4cc9d6','#e6b455','#e0935a','#c678dd','#5fd08a','#f7768e'];

let appData={grupos:[], familias:[], eventos:[], _meta:{ng:1,nf:1,np:1,ne:1}};
let currentTab='eventos', currentEventId=null, currentFamId=null, currentGroupId=null, donutChart=null;
let _fichaGruposFiltro=new Set();
let _fEstado=null, _fCat=null, _ncAberto=false, _ncFamAberta=new Set();

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function b64enc(str){return btoa(unescape(encodeURIComponent(str)));}
function b64dec(b64){return decodeURIComponent(escape(atob(b64.replace(/\s/g,''))));}
function ensureMeta(){
  appData.grupos=appData.grupos||[]; appData.familias=appData.familias||[]; appData.eventos=appData.eventos||[];
  appData._meta=appData._meta||{}; const m=appData._meta;
  const max=(arr,f)=>arr.reduce((a,x)=>Math.max(a,f(x)||0),0);
  if(!m.ng) m.ng=max(appData.grupos,g=>g.id)+1;
  if(!m.nf) m.nf=max(appData.familias,f=>f.id)+1;
  if(!m.np){let mx=0; appData.familias.forEach(f=>(f.membros||[]).forEach(p=>mx=Math.max(mx,p.id||0))); m.np=mx+1;}
  if(!m.ne) m.ne=max(appData.eventos,e=>e.id)+1;
}
const newGrupoId=()=>appData._meta.ng++;
const newFamId=()=>appData._meta.nf++;
const newPesId=()=>appData._meta.np++;
const newEvId=()=>appData._meta.ne++;
function fmtData(iso){
  if(!iso) return 'Sem data';
  const [y,mo,d]=iso.split('-').map(Number);
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d} ${meses[mo-1]} ${y}`;
}
const grupoById=id=>appData.grupos.find(g=>g.id===id);
const isIrmao=n=>/irm[ãa]o?\s+de/i.test(n);
function sortedMembros(membros){
  return [...(membros||[])].sort((a,b)=>{
    const ai=isIrmao(a.nome),bi=isIrmao(b.nome);
    if(ai!==bi) return ai?1:-1;
    const aa=a.tipo==='adulto',ba=b.tipo==='adulto';
    if(!ai&&!bi&&aa!==ba) return aa?-1:1;
    return 0;
  });
}
function sortedFamilias(){
  return [...appData.familias].sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
}
function familiasDoEvento(ev){
  const g=ev.grupos||[];
  const base=sortedFamilias();
  let result;
  if(!g.length){
    result=base;
  } else {
    result=base.filter(f=>(f.grupos||[]).some(id=>g.includes(id)));
    const mfid=appData.minhaFamiliaId;
    if(mfid&&!result.some(f=>f.id===mfid)){
      const mf=appData.familias.find(f=>f.id===mfid);
      if(mf) result=[mf,...result];
    }
  }
  return result;
}
function estadoMembro(ev,f,p){ const def=(f.id===appData.minhaFamiliaId)?'vem':'pend'; return (ev.respostas||{})[p.id]||def; }
function familiaNaoConvidada(ev,f){ const m=f.membros||[]; return m.length>0 && m.every(p=>estadoMembro(ev,f,p)==='nc'); }
function familiasConvidadas(ev){ return familiasDoEvento(ev).filter(f=>!familiaNaoConvidada(ev,f)); }
function familiasNaoConvidadas(ev){ return familiasDoEvento(ev).filter(f=>familiaNaoConvidada(ev,f)); }
function membrosNc(ev,f){ return (f.membros||[]).filter(p=>estadoMembro(ev,f,p)==='nc'); }
function familiasComNc(ev){ return familiasDoEvento(ev).filter(f=>membrosNc(ev,f).length>0); }
/* migração: antigo ev.naoConvidados (família inteira) -> estado 'nc' por membro */
function normalizeNC(){
  (appData.eventos||[]).forEach(ev=>{
    if(ev.naoConvidados&&ev.naoConvidados.length){
      ev.respostas=ev.respostas||{};
      ev.naoConvidados.forEach(fid=>{
        const f=appData.familias.find(x=>x.id===fid);
        (f&&f.membros||[]).forEach(p=>{ ev.respostas[p.id]='nc'; });
      });
      ev.naoConvidados=[];
    }
  });
}
function familiasParaDashboard(ev){
  const base=familiasConvidadas(ev);
  if(_fichaGruposFiltro.size===0) return base;
  return base.filter(f=>(f.grupos||[]).some(id=>_fichaGruposFiltro.has(id)));
}
/* Ordem dos grupos: prioridade fixa primeiro, depois alfabético */
const ORDEM_GRUPOS=['Família Direta','Família Lisboa','Família Braga'];
function ordenarGrupos(arr){
  const idx=g=>{const i=ORDEM_GRUPOS.indexOf(g.nome); return i<0?999:i;};
  return [...arr].sort((a,b)=>{
    const da=idx(a), db=idx(b);
    if(da!==db) return da-db;
    return a.nome.localeCompare(b.nome,'pt');
  });
}
function gruposOrdenados(){ return ordenarGrupos(appData.grupos); }
/* Ordena famílias: a minha família primeiro, depois alfabético */
function ordenarFamilias(arr){
  const mfid=appData.minhaFamiliaId;
  return [...arr].sort((a,b)=>{
    if(a.id===mfid) return -1;
    if(b.id===mfid) return 1;
    return a.nome.localeCompare(b.nome,'pt');
  });
}
/* Agrupa uma lista de famílias por grupo (ordem prioritária), cada família uma só vez */
function agruparFamilias(fams){
  const shown=new Set(); const secs=[];
  for(const g of gruposOrdenados()){
    const fs=ordenarFamilias(fams.filter(f=>!shown.has(f.id)&&(f.grupos||[]).includes(g.id)));
    if(!fs.length) continue;
    fs.forEach(f=>shown.add(f.id));
    secs.push({grupo:g, fams:fs});
  }
  const orphans=ordenarFamilias(fams.filter(f=>!shown.has(f.id)));
  return {secs, orphans};
}
function tallyFams(ev,fams){
  const r=ev.respostas||{};
  let vemA=0,vemC=0,naoA=0,naoC=0,pendA=0,pendC=0;
  fams.forEach(f=>{
    const def=f.id===appData.minhaFamiliaId?'vem':'pend';
    sortedMembros(f.membros).forEach(p=>{
      const st=r[p.id]||def; const kid=p.tipo==='crianca';
      if(st==='nc') return;
      if(st==='vem'){kid?vemC++:vemA++;}
      else if(st==='nao'){kid?naoC++:naoA++;}
      else{kid?pendC++:pendA++;}
    });
  });
  return {vemA,vemC,naoA,naoC,pendA,pendC, vem:vemA+vemC, nao:naoA+naoC, pend:pendA+pendC};
}
function tally(ev){return tallyFams(ev,familiasConvidadas(ev));}
function toggleFichaGrupo(id){
  if(_fichaGruposFiltro.has(id)) _fichaGruposFiltro.delete(id);
  else _fichaGruposFiltro.add(id);
  const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy);
}
function setFiltro(estado,cat){
  if(_fEstado===estado && _fCat===cat){ _fEstado=null; _fCat=null; }
  else { _fEstado=estado; _fCat=cat; }
  const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy);
}

/* ---------- chips de grupo ---------- */
function gchipToggle(g,on,onclick){return `<button type="button" class="gchip${on?' on':''}" style="--gc:${g.cor||'#7aa2f7'}" onclick="${onclick}">${esc(g.nome)}</button>`;}
function gchipRO(g,extra){return `<span class="gchip ro ${extra||''}" style="--gc:${g.cor||'#7aa2f7'}">${esc(g.nome)}</span>`;}

/* =========================================================================
   SYNC SUPABASE (schema gestaoeventos) — nomes carregar/pushToGitHub preservados
   ========================================================================= */
async function carregar(silent){
  if(!_sbSession) return;
  try{
    const [g,f,e,c]=await Promise.all([
      sbReq('GET','grupos?select=*&order=id.asc'),
      sbReq('GET','familias?select=*&order=id.asc'),
      sbReq('GET','eventos?select=*&order=id.asc'),
      sbReq('GET','config?id=eq.1&select=*')
    ]);
    const cfg=(Array.isArray(c)&&c[0])||{};
    appData={
      grupos:(g||[]).map(x=>({id:x.id,nome:x.nome,cor:x.cor})),
      familias:(f||[]).map(x=>({id:x.id,nome:x.nome,grupos:x.grupos||[],membros:x.membros||[]})),
      eventos:(e||[]).map(x=>({id:x.id,nome:x.nome,tipo:x.tipo,data:x.data||'',hora:x.hora||'',local:x.local||'',notas:x.notas||'',grupos:x.grupos||[],respostas:x.respostas||{},naoConvidados:x.nao_convidados||[]})),
      minhaFamiliaId:(cfg.minha_familia_id!=null?cfg.minha_familia_id:null),
      _meta:cfg.meta||{ng:1,nf:1,np:1,ne:1}
    };
    ensureMeta(); normalizeNC(); render();
    if(!silent) toast('Sincronizado');
  }catch(err){
    console.error(err);
    if(!silent) toast('Não consegui ler os dados');
    ensureMeta(); render();
  }
}

let _writeChain=Promise.resolve(), _writePending=0, ge_dirty=false, _saveTimer=null;
function scheduleSave(msg){
  ge_dirty=true; clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{ ge_dirty=false; pushToGitHub(msg); }, 1100);
}
function pushToGitHub(msg){
  if(!_sbSession){toast('Sessão expirada — volta a entrar'); return Promise.resolve(false);}
  const snap=JSON.parse(JSON.stringify(appData));
  _writePending++;
  _writeChain=_writeChain.then(()=>_sbSaveAll(snap)).catch(e=>{console.error(e);return false;})
    .finally(()=>{_writePending=Math.max(0,_writePending-1);});
  return _writeChain;
}
async function _sbSaveAll(d){
  try{
    await sbReq('POST','config?on_conflict=id',[{id:1,minha_familia_id:(d.minhaFamiliaId!=null?d.minhaFamiliaId:null),meta:d._meta}],{Prefer:'resolution=merge-duplicates,return=minimal'});
    await sbReq('DELETE','grupos?id=gt.0');
    if(d.grupos.length) await sbReq('POST','grupos',d.grupos.map(g=>({id:g.id,nome:g.nome,cor:g.cor||null})),{Prefer:'return=minimal'});
    await sbReq('DELETE','familias?id=gt.0');
    if(d.familias.length) await sbReq('POST','familias',d.familias.map(f=>({id:f.id,nome:f.nome,grupos:f.grupos||[],membros:f.membros||[]})),{Prefer:'return=minimal'});
    await sbReq('DELETE','eventos?id=gt.0');
    if(d.eventos.length) await sbReq('POST','eventos',d.eventos.map(e=>({id:e.id,nome:e.nome,tipo:e.tipo||null,data:e.data||null,hora:e.hora||null,local:e.local||null,notas:e.notas||null,grupos:e.grupos||[],respostas:e.respostas||{},nao_convidados:e.naoConvidados||[]})),{Prefer:'return=minimal'});
    return true;
  }catch(e){ console.error(e); toast('Erro ao gravar: '+e.message); return false; }
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && _sbSession && _writePending===0 && !ge_dirty) carregar(true);
});

/* =========================================================================
   RENDER
   ========================================================================= */
function render(){
  const detalhe=currentEventId||currentFamId||currentGroupId;
  $('#tabsBar').style.display=detalhe?'none':'flex';
  $('#fab').style.display=detalhe?'none':'grid';
  if(currentEventId) return renderFicha();
  if(currentFamId) return renderFamDetail();
  if(currentGroupId) return renderGroupDetail();
  if(currentTab==='eventos') return renderEventos();
  return renderPessoas();
}

function renderEventos(){
  const evs=[...appData.eventos].sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  if(!evs.length){
    $('#view').innerHTML=`<div class="empty"><div class="big">🗓️</div>
      <h2>Ainda sem eventos</h2>
      <p>Cria o teu primeiro almoço, jantar ou festa e escolhe que grupos convidar.</p>
      <button class="btn" onclick="abrirEvento()">+ Novo evento</button></div>`;
    return;
  }
  $('#view').innerHTML=evs.map(ev=>{
    const t=tally(ev); const tp=TIPOS[ev.tipo]||TIPOS.outro;
    const meta=[fmtData(ev.data), ev.hora||'', ev.local||''].filter(Boolean).join(' · ');
    const gconv=ordenarGrupos((ev.grupos||[]).map(grupoById).filter(Boolean));
    const gline=gconv.length?`<div class="gwrap" style="margin-top:10px">${gconv.map(g=>gchipRO(g)).join('')}</div>`:'';
    return `<div class="card tap" onclick="abrirFicha(${ev.id})">
      <div class="ev-top">
        <div class="ev-emoji">${tp.e}</div>
        <div style="flex:1;min-width:0">
          <div class="ev-name">${esc(ev.nome)}</div>
          <div class="ev-meta">${esc(meta)}</div>
        </div>
      </div>
      ${gline}
      <div class="ev-tally">
        <span class="tly"><i class="pip v"></i><b>${t.vem}</b> vêm</span>
        <span class="tly"><i class="pip n"></i><b>${t.nao}</b> não</span>
        <span class="tly"><i class="pip p"></i><b>${t.pend}</b> por responder</span>
      </div>
    </div>`;
  }).join('');
}

function famCardHTML(f){
  const isMinha=f.id===appData.minhaFamiliaId;
  const ad=(f.membros||[]).filter(p=>p.tipo!=='crianca').length;
  const ki=(f.membros||[]).filter(p=>p.tipo==='crianca').length;
  const resumo=[ad?ad+'A':'', ki?ki+'C':''].filter(Boolean).join(' · ')||'—';
  return `<div class="fam-card tap${isMinha?' minha':''}" onclick="abrirFamDetalhe(${f.id})">
    <div class="fam-card-head">
      <h3>${isMinha?'🏠 ':''}${esc(f.nome)}</h3>
      <span class="fc-count">${resumo}</span>
      <span class="chev">›</span>
    </div>
  </div>`;
}
function renderPessoas(){
  const gruposBar=`<div class="section-lbl">Grupos</div>
    <div class="gwrap" style="margin-bottom:20px">
      ${gruposOrdenados().map(g=>`<button type="button" class="gchip ro tap" style="--gc:${g.cor||'#7aa2f7'}" onclick="abrirGrupoDetalhe(${g.id})">${esc(g.nome)}</button>`).join('')}
      <button type="button" class="add-m" onclick="abrirGrupo()">+ grupo</button>
    </div>`;
  if(!appData.familias.length){
    $('#view').innerHTML=gruposBar+`<div class="empty"><div class="big">👪</div>
      <h2>Sem famílias</h2>
      <p>Adiciona as famílias e os seus membros (adultos e crianças), e associa-as a grupos.</p>
      <button class="btn" onclick="abrirFamilia()">+ Nova família</button></div>`;
    return;
  }
  let sections=''; const {secs, orphans}=agruparFamilias(appData.familias);
  for(const {grupo:g, fams} of secs){
    sections+=`<div class="group-header"><span class="gchip ro" style="--gc:${g.cor||'#7aa2f7'}">${esc(g.nome)}</span></div>`;
    sections+=fams.map(famCardHTML).join('');
  }
  if(orphans.length){
    sections+=`<div class="section-lbl" style="margin-top:18px">Sem grupo</div>`;
    sections+=orphans.map(famCardHTML).join('');
  }
  $('#view').innerHTML=gruposBar+sections;
}

function renderFicha(){
  const ev=appData.eventos.find(e=>e.id===currentEventId);
  if(!ev){currentEventId=null; return render();}
  const tp=TIPOS[ev.tipo]||TIPOS.outro;
  const meta=[fmtData(ev.data), ev.hora||'', ev.local||''].filter(Boolean).join(' · ');
  const gconv=ordenarGrupos((ev.grupos||[]).map(grupoById).filter(Boolean));
  const filt=_fichaGruposFiltro;
  const gline = gconv.length
    ? `<div class="gwrap" style="margin:2px 0 4px">${gconv.map(g=>{
        const on=filt.size===0||filt.has(g.id);
        return `<button type="button" class="gchip ro tap${on?'':' dimmed'}" style="--gc:${g.cor||'#7aa2f7'}" onclick="toggleFichaGrupo(${g.id})">${esc(g.nome)}</button>`;
      }).join('')}</div>`
    : `<div class="gwrap" style="margin:2px 0 4px"><span class="gchip ro neutral">Todas as famílias</span></div>`;

  const fams=familiasParaDashboard(ev);
  const t=tallyFams(ev,fams);
  const estadoLbl={vem:'Vêm',nao:'Não vêm',pend:'Por responder'};
  const catLbl={adulto:'adultos',crianca:'crianças'};
  const filtLbl=_fEstado?(estadoLbl[_fEstado]+(_fCat?' · '+catLbl[_fCat]:'')):null;
  const sectionLbl = filtLbl
    ? `A mostrar: ${filtLbl}`
    : (filt.size>0?`Presenças — ${[...filt].map(id=>(grupoById(id)||{}).nome).filter(Boolean).join(', ')}`:'Presenças por família');
  const r=ev.respostas||{};
  const corDaFamilia=f=> f.id===appData.minhaFamiliaId ? 'var(--gold)' : (((f.grupos||[]).map(grupoById).find(Boolean)||{}).cor || '#7aa2f7');
  const famBloco=(f)=>{
    const isMinha=f.id===appData.minhaFamiliaId;
    const def=isMinha?'vem':'pend';
    let mem=sortedMembros(f.membros);
    if(_fEstado) mem=mem.filter(p=>((r[p.id]||def)===_fEstado));
    if(_fCat) mem=mem.filter(p=> _fCat==='adulto' ? p.tipo!=='crianca' : p.tipo==='crianca');
    if((_fEstado||_fCat) && !mem.length) return '';
    const membros=mem.map(p=>{
      const st=r[p.id]||def;
      const cls=st==='vem'?' is-vem':st==='nao'?' is-nao':st==='nc'?' is-nc':'';
      return `<div class="member${cls}">
        <div class="m-name">${esc(p.nome)}${p.tipo==='crianca'?'<span class="kid">criança</span>':''}</div>
        <div class="seg">
          <button class="${st==='vem'?'on v':''}" onclick="setPresenca(${p.id},'vem')">✓</button>
          <button class="${st==='nao'?'on n':''}" onclick="setPresenca(${p.id},'nao')">✗</button>
          <button class="${st==='pend'?'on p':''}" onclick="setPresenca(${p.id},'pend')">–</button>
          <button class="${st==='nc'?'on nc':''}" onclick="setPresenca(${p.id},'nc')" title="Não convidado">⊘</button>
        </div>
      </div>`;
    }).join('');
    const cor=corDaFamilia(f);
    return `<div class="fam${isMinha?' minha':''}">
      <div class="fam-head" style="background:color-mix(in srgb, ${cor} 15%, var(--surface)); border-bottom-color:color-mix(in srgb, ${cor} 35%, var(--border))">
        <span class="fam-dot" style="background:${cor}"></span>
        <div class="fam-name" style="color:color-mix(in srgb, ${cor} 55%, var(--text))">${isMinha?'🏠 ':''}${esc(f.nome)}</div>
        <div class="fam-quick">
          <button class="qbtn v" onclick="setFamilia(${f.id},'vem')" title="Todos vêm">✓</button>
          <button class="qbtn n" onclick="setFamilia(${f.id},'nao')" title="Todos não">✗</button>
          <button class="qbtn p" onclick="setFamilia(${f.id},'pend')" title="Limpar">–</button>
          <button class="qbtn nc" onclick="setFamilia(${f.id},'nc')" title="Não convidar família">⊘</button>
        </div>
      </div>
      ${membros||'<div class="member"><div class="m-name" style="color:var(--faint)">Sem membros</div></div>'}
    </div>`;
  };
  const famBlocoNaoConv=(f)=>{
    const isMinha=f.id===appData.minhaFamiliaId;
    const cor=corDaFamilia(f);
    const ncm=membrosNc(ev,f);
    const todosNc=ncm.length===(f.membros||[]).length;
    const aberta=_ncFamAberta.has(f.id);
    const corpo=aberta?`<div class="ncf-body">${ncm.map(p=>`
      <div class="ncf-membro">
        <span class="m-name">${esc(p.nome)}${p.tipo==='crianca'?'<span class="kid">criança</span>':''}</span>
        <button class="add-m" style="padding:3px 10px" onclick="convidarMembro(${p.id})">+ Convidar</button>
      </div>`).join('')}</div>`:'';
    return `<div class="fam nc-fam${aberta?' open':''}">
      <div class="fam-head ncf-head" onclick="toggleNcFam(${f.id})">
        <span class="fam-dot" style="background:${cor}; opacity:.5"></span>
        <div class="fam-name" style="color:var(--dim)">${isMinha?'🏠 ':''}${esc(f.nome)} <span class="nc-count">${ncm.length}</span></div>
        ${todosNc?`<button class="add-m" style="padding:4px 11px" onclick="event.stopPropagation();convidarFamilia(${f.id})">+ Convidar</button>`:''}
        <span class="nc-chev${aberta?' open':''}">›</span>
      </div>
      ${corpo}
    </div>`;
  };
  const {secs, orphans}=agruparFamilias(fams);
  let famHtml='';
  for(const {grupo:g, fams:fs} of secs){
    const blocos=fs.map(famBloco).filter(Boolean).join('');
    if(!blocos) continue;
    famHtml+=`<div class="group-header ge-evt"><span class="gchip ro" style="--gc:${g.cor||'#7aa2f7'}">${esc(g.nome)}</span></div>${blocos}`;
  }
  if(orphans.length){
    const blocos=orphans.map(famBloco).filter(Boolean).join('');
    if(blocos) famHtml+=`<div class="group-header ge-evt"><span class="gchip ro neutral">Sem grupo</span></div>${blocos}`;
  }
  let ncFams=familiasComNc(ev);
  if(_fichaGruposFiltro.size>0) ncFams=ncFams.filter(f=>(f.grupos||[]).some(id=>_fichaGruposFiltro.has(id)));
  if(!famHtml){
    famHtml=(_fEstado||_fCat)
      ? `<div class="empty" style="padding:30px 20px"><p>Ninguém para o filtro “${filtLbl||''}”.</p></div>`
      : ncFams.length
        ? `<div class="empty" style="padding:24px 20px"><p>Nenhuma família convidada — todas as deste(s) grupo(s) estão por convidar (ver abaixo).</p></div>`
        : `<div class="empty" style="padding:30px 20px"><p>Nenhuma família nos grupos convidados. Ajusta os grupos do evento ou associa famílias a esses grupos em Pessoas.</p></div>`;
  }
  if(!(_fEstado||_fCat) && ncFams.length){
    famHtml+=`
      <div class="nc-sep"></div>
      <button type="button" class="nc-toggle" onclick="toggleNaoConv()">
        Não convidadas <span class="nc-count">${ncFams.length}</span>
        <span class="nc-chev${_ncAberto?' open':''}">›</span>
      </button>
      ${_ncAberto?`<div class="nc-list">${ncFams.map(famBlocoNaoConv).join('')}</div>`:''}`;
  }

  $('#view').innerHTML=`
    <button class="back" onclick="fecharFicha()">‹ Eventos</button>
    <div class="ficha-head">
      <div class="ev-emoji">${tp.e}</div>
      <div class="ficha-title">
        <h1>${esc(ev.nome)}</h1>
        <div class="ev-meta">${esc(meta)}</div>
      </div>
      <div class="ficha-actions">
        <button class="mini-btn" onclick="abrirEvento(${ev.id})" title="Editar">✎</button>
        <button class="mini-btn" onclick="removerEvento(${ev.id})" title="Apagar">🗑</button>
      </div>
    </div>
    ${gline}
    <div class="dash">
      <div class="dash-row3">
        <button type="button" class="dcell donut-cell${(_fEstado==='vem'&&!_fCat)?' active':''}" onclick="setFiltro('vem',null)">
          <div class="donut-wrap">
            <canvas id="donut" width="92" height="92"></canvas>
            <div class="donut-center"><div class="num">${t.vem}</div><div class="lbl">vêm</div></div>
          </div>
        </button>
        <button type="button" class="dcell${(_fEstado==='vem'&&_fCat==='adulto')?' active':''}" onclick="setFiltro('vem','adulto')"><div class="n">${t.vemA}</div><div class="t">Adultos</div></button>
        <button type="button" class="dcell${(_fEstado==='vem'&&_fCat==='crianca')?' active':''}" onclick="setFiltro('vem','crianca')"><div class="n">${t.vemC}</div><div class="t">Crianças</div></button>
      </div>
      <div class="dash-row2">
        <button type="button" class="dbtn n${_fEstado==='nao'?' active':''}" onclick="setFiltro('nao',null)"><i class="pip n"></i> Não vêm <b>${t.nao}</b></button>
        <button type="button" class="dbtn p${_fEstado==='pend'?' active':''}" onclick="setFiltro('pend',null)"><i class="pip p"></i> Por responder <b>${t.pend}</b></button>
      </div>
    </div>
    <div class="section-lbl">${sectionLbl}</div>
    ${famHtml}`;
  drawDonut(t);
}

function drawDonut(t){
  const cv=$('#donut'); if(!cv) return;
  if(donutChart) donutChart.destroy();
  const data=[t.vem,t.nao,t.pend];
  const css=getComputedStyle(document.documentElement);
  if(data.every(v=>v===0)) data[2]=1;
  donutChart=new Chart(cv,{type:'doughnut',data:{
    labels:['Vêm','Não vêm','Por responder'],
    datasets:[{data, backgroundColor:[css.getPropertyValue('--vem').trim(),css.getPropertyValue('--nao').trim(),'#d7d1c2'], borderColor:css.getPropertyValue('--surface').trim(), borderWidth:2}]
  },options:{cutout:'72%', plugins:{legend:{display:false},tooltip:{enabled:true}}, animation:{duration:350}}});
}

   PRESENÇAS
   ========================================================================= */
function setPresenca(pid,st){
  const ev=appData.eventos.find(e=>e.id===currentEventId); if(!ev) return;
  ev.respostas=ev.respostas||{};
  const f=appData.familias.find(x=>(x.membros||[]).some(m=>m.id===pid));
  const def=(f&&f.id===appData.minhaFamiliaId)?'vem':'pend';
  if(st===def) delete ev.respostas[pid]; else ev.respostas[pid]=st;
  renderFicha(); scheduleSave('Presença atualizada: '+ev.nome);
}
function setFamilia(fid,st){
  const ev=appData.eventos.find(e=>e.id===currentEventId); if(!ev) return;
  const f=appData.familias.find(x=>x.id===fid); if(!f) return;
  ev.respostas=ev.respostas||{};
  const def=fid===appData.minhaFamiliaId?'vem':'pend';
  (f.membros||[]).forEach(p=>{ if(st===def) delete ev.respostas[p.id]; else ev.respostas[p.id]=st; });
  renderFicha(); scheduleSave('Família '+f.nome+' atualizada: '+ev.nome);
}
function convidarFamilia(fid){
  const ev=appData.eventos.find(e=>e.id===currentEventId); if(!ev) return;
  const f=appData.familias.find(x=>x.id===fid); if(!f) return;
  ev.respostas=ev.respostas||{};
  (f.membros||[]).forEach(p=>{ if(ev.respostas[p.id]==='nc') delete ev.respostas[p.id]; });
  const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy);
  scheduleSave('Convidada: '+f.nome+' — '+ev.nome);
  toast(`${f.nome} convidada`);
}
function convidarMembro(pid){
  const ev=appData.eventos.find(e=>e.id===currentEventId); if(!ev) return;
  ev.respostas=ev.respostas||{};
  delete ev.respostas[pid];
  const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy);
  scheduleSave('Convidado: '+ev.nome);
}
function toggleNcFam(fid){ _ncFamAberta.has(fid)?_ncFamAberta.delete(fid):_ncFamAberta.add(fid); const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy); }
function toggleNaoConv(){ _ncAberto=!_ncAberto; const sy=window.scrollY; renderFicha(); window.scrollTo(0,sy); }

/* ---- Grupo ---- */
let _grupoCor=GRUPO_CORES[0];
function abrirGrupo(id){
  const g=id?grupoById(id):null;
  _grupoCor=g?g.cor:GRUPO_CORES[appData.grupos.length%GRUPO_CORES.length];
  const swatches=GRUPO_CORES.map(c=>`<button type="button" class="swatch${c===_grupoCor?' on':''}" data-c="${c}" style="background:${c}" onclick="selGrupoCor('${c}')"></button>`).join('');
  openSheet(`<h2>${g?'Editar grupo':'Novo grupo'}</h2>
    <div class="field"><label>Nome</label><input id="gNome" placeholder="Ex.: Amigos de Lisboa" value="${g?esc(g.nome):''}"></div>
    <div class="field"><label>Cor</label><div class="swatches" id="gSwatches">${swatches}</div></div>
    <div class="sheet-actions">
      ${g?`<button class="btn danger" onclick="removerGrupo(${id})">Apagar</button>`:`<button class="btn ghost" onclick="closeSheet()">Cancelar</button>`}
      <button class="btn" onclick="guardarGrupo(${id||0})">${g?'Guardar':'Criar'}</button>
    </div>`);
  setTimeout(()=>$('#gNome')&&$('#gNome').focus(),60);
}
function selGrupoCor(c){_grupoCor=c; document.querySelectorAll('#gSwatches .swatch').forEach(b=>b.classList.toggle('on',b.dataset.c===c));}
function guardarGrupo(id){
  const nome=$('#gNome').value.trim(); if(!nome){toast('Dá um nome ao grupo'); return;}
  if(id){const g=grupoById(id); g.nome=nome; g.cor=_grupoCor;}
  else{appData.grupos.push({id:newGrupoId(), nome, cor:_grupoCor});}
  closeSheet(); render(); scheduleSave('Grupo: '+nome);
}
function removerGrupo(id){
  const g=grupoById(id); if(!g) return;
  if(!confirm(`Apagar o grupo "${g.nome}"? As famílias deixam de o ter e os eventos deixam de o convidar.`)) return;
  appData.grupos=appData.grupos.filter(x=>x.id!==id);
  appData.familias.forEach(f=>{ if(f.grupos) f.grupos=f.grupos.filter(x=>x!==id); });
  appData.eventos.forEach(e=>{ if(e.grupos) e.grupos=e.grupos.filter(x=>x!==id); });
  currentGroupId=null;
  closeSheet(); render(); scheduleSave('Grupo removido');
}

    </div>
    <div class="field"><label>Local</label><input id="evLocal" placeholder="Restaurante, casa, ..." value="${ev?esc(ev.local||''):''}"></div>
    <div class="field"><label>Convidar grupos</label><div class="gwrap" id="evGruposWrap">${gchips}</div>
      <p class="hint">Sem grupos selecionados = convite a todas as famílias.</p></div>
    <div class="field"><label>Notas</label><textarea id="evNotas" placeholder="Opcional">${ev?esc(ev.notas||''):''}</textarea></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
      <button class="btn" onclick="guardarEvento(${id||0})">${ev?'Guardar':'Criar'}</button>
    </div>`);
  setTimeout(()=>$('#evNome')&&$('#evNome').focus(),60);
}
function selTipo(k){_evTipo=k; document.querySelectorAll('#evTipos .typeopt').forEach(b=>b.classList.toggle('on',b.dataset.tipo===k));}
function toggleEvGrupo(id){ _evGrupos.has(id)?_evGrupos.delete(id):_evGrupos.add(id);
  const w=$('#evGruposWrap'); if(w) w.innerHTML=appData.grupos.map(g=>gchipToggle(g,_evGrupos.has(g.id),`toggleEvGrupo(${g.id})`)).join('');}
function guardarEvento(id){
  const nome=$('#evNome').value.trim(); if(!nome){toast('Dá um nome ao evento'); return;}
  const dados={nome, tipo:_evTipo, data:$('#evData').value, hora:$('#evHora').value, local:$('#evLocal').value.trim(), notas:$('#evNotas').value.trim(), grupos:[..._evGrupos]};
  if(id){Object.assign(appData.eventos.find(e=>e.id===id), dados);}
  else{const ev={id:newEvId(), ...dados, respostas:{}, naoConvidados:[]}; appData.eventos.push(ev); currentEventId=ev.id;}
  closeSheet(); render(); scheduleSave('Evento: '+nome);
}
function removerEvento(id){
  const ev=appData.eventos.find(e=>e.id===id); if(!ev) return;
  if(!confirm(`Apagar o evento "${ev.nome}"?`)) return;
  appData.eventos=appData.eventos.filter(e=>e.id!==id); currentEventId=null;
  render(); scheduleSave('Evento removido');
}

/* ---- Família ---- */
let _famGrupos=new Set();
function abrirFamilia(id){
  const f=id?appData.familias.find(x=>x.id===id):null;
  _famGrupos=new Set(f?(f.grupos||[]):[]);
  const gchips=appData.grupos.length?appData.grupos.map(g=>gchipToggle(g,_famGrupos.has(g.id),`toggleFamGrupo(${g.id})`)).join(''):'<span class="hint" style="margin:0">Sem grupos criados ainda.</span>';
  openSheet(`<h2>${f?'Editar família':'Nova família'}</h2>
    <div class="field"><label>Nome da família / casal</label><input id="famNome" placeholder="Ex.: Família Silva" value="${f?esc(f.nome):''}"></div>
    <div class="field"><label>Grupos</label><div class="gwrap" id="famGruposWrap">${gchips}</div></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Cancelar</button>
      <button class="btn" onclick="guardarFamilia(${id||0})">${f?'Guardar':'Criar'}</button>
    </div>`);
  setTimeout(()=>$('#famNome')&&$('#famNome').focus(),60);
}
function toggleFamGrupo(id){ _famGrupos.has(id)?_famGrupos.delete(id):_famGrupos.add(id);
  const w=$('#famGruposWrap'); if(w) w.innerHTML=appData.grupos.map(g=>gchipToggle(g,_famGrupos.has(g.id),`toggleFamGrupo(${g.id})`)).join('');}
function guardarFamilia(id){
  const nome=$('#famNome').value.trim(); if(!nome){toast('Dá um nome à família'); return;}
  if(id){const f=appData.familias.find(x=>x.id===id); f.nome=nome; f.grupos=[..._famGrupos];}
  else{appData.familias.push({id:newFamId(), nome, grupos:[..._famGrupos], membros:[]});}
  closeSheet(); currentTab='pessoas'; currentEventId=null;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='pessoas'));
  render(); scheduleSave('Família: '+nome);
}
function removerFamilia(id){
  const f=appData.familias.find(x=>x.id===id); if(!f) return;
  if(!confirm(`Apagar "${f.nome}" e os seus membros? As respostas em eventos também são removidas.`)) return;
  const ids=(f.membros||[]).map(p=>p.id);
  appData.familias=appData.familias.filter(x=>x.id!==id);
  appData.eventos.forEach(e=>{ if(e.respostas) ids.forEach(pid=>delete e.respostas[pid]); });
  currentFamId=null;
  render(); scheduleSave('Família removida');
}

/* ---- Membro ---- */
let _mTipo='adulto';
function abrirMembro(fid){
  _mTipo='adulto';
  openSheet(`<h2>Novo membro</h2>
    <div class="field"><label>Nome</label><input id="mNome" placeholder="Ex.: António"></div>
    <div class="field"><label>Tipo</label>
      <div class="toggle2" id="mTipoTg">
        <button type="button" tabindex="-1" class="on" onclick="selMTipo('adulto')">Adulto</button>
        <button type="button" tabindex="-1" onclick="selMTipo('crianca')">Criança</button>
      </div></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Fechar</button>
      <button class="btn" onclick="guardarMembro(${fid})">Adicionar</button>
    </div>
    <p class="hint">Ao adicionar, o campo limpa para meteres o próximo.</p>`);
  setTimeout(()=>$('#mNome')&&$('#mNome').focus(),60);
}
function selMTipo(t){_mTipo=t; const tg=$('#mTipoTg'); if(!tg) return; [...tg.children].forEach((b,i)=>b.classList.toggle('on',(t==='adulto')===(i===0)));}
function guardarMembro(fid){
  const nome=$('#mNome').value.trim(); if(!nome){toast('Indica o nome'); return;}
  const f=appData.familias.find(x=>x.id===fid); if(!f) return;
  f.membros=f.membros||[]; f.membros.push({id:newPesId(), nome, tipo:_mTipo});
  scheduleSave('Membro: '+nome);
  $('#mNome').value=''; $('#mNome').focus(); render(); toast(nome+' adicionado');
}
function editarMembro(fid,pid){
  const f=appData.familias.find(x=>x.id===fid);
  const p=(f?.membros||[]).find(x=>x.id===pid);
  if(!p) return;
  _mTipo=p.tipo;
  openSheet(`<h2>Editar membro</h2>
    <div class="field"><label>Nome</label><input id="mNome" value="${esc(p.nome)}"></div>
    <div class="field"><label>Tipo</label>
      <div class="toggle2" id="mTipoTg">
        <button type="button" tabindex="-1" class="${p.tipo==='adulto'?'on':''}" onclick="selMTipo('adulto')">Adulto</button>
        <button type="button" tabindex="-1" class="${p.tipo==='crianca'?'on':''}" onclick="selMTipo('crianca')">Criança</button>
      </div></div>
    <div class="sheet-actions">
      <button class="btn danger" onclick="closeSheet();removerMembro(${fid},${pid})">Eliminar</button>
      <button class="btn" onclick="guardarMembroEdit(${fid},${pid})">Guardar</button>
    </div>`);
  setTimeout(()=>$('#mNome')&&$('#mNome').focus(),60);
}
function guardarMembroEdit(fid,pid){
  const nome=$('#mNome').value.trim(); if(!nome){toast('Indica o nome');return;}
  const f=appData.familias.find(x=>x.id===fid);
  const p=(f?.membros||[]).find(x=>x.id===pid);
  if(!p) return;
  p.nome=nome; p.tipo=_mTipo;
  closeSheet(); render(); scheduleSave('Membro editado: '+nome);
}
function removerMembro(fid,pid){
  const f=appData.familias.find(x=>x.id===fid); if(!f) return;
  const p=(f.membros||[]).find(x=>x.id===pid); if(!p) return;
  if(!confirm(`Remover ${p.nome}?`)) return;
  f.membros=f.membros.filter(x=>x.id!==pid);
  appData.eventos.forEach(e=>{ if(e.respostas) delete e.respostas[pid]; });
  render(); scheduleSave('Membro removido');
}

/* =========================================================================
   AUTH (Supabase — só Google) + ADMIN
   ========================================================================= */
async function sbInit(){
  const stored=localStorage.getItem(SESSION_KEY);
  if(stored){
    try{
      _sbSession=JSON.parse(stored);
      if(tokenQuaseExpirado()) await sbRefresh();
      let r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${_sbSession.access_token}`}});
      if(!r.ok&&_sbSession.refresh_token&&await sbRefresh())
        r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${_sbSession.access_token}`}});
      if(r.ok){const u=await r.json(); sbSaveSession({..._sbSession,user:u}); return sbAposLogin();}
    }catch(e){}
    _sbSession=null; localStorage.removeItem(SESSION_KEY);
  }
  const hash=window.location.hash;
  if(hash.includes('access_token')){
    const p=new URLSearchParams(hash.substring(1));
    const access_token=p.get('access_token'), refresh_token=p.get('refresh_token');
    const expires_at=parseInt(p.get('expires_at'))||Math.floor(Date.now()/1000)+(parseInt(p.get('expires_in'))||3600);
    if(access_token){
      const r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{'apikey':SB_KEY,'Authorization':`Bearer ${access_token}`}});
      if(r.ok){
        const u=await r.json();
        sbSaveSession({access_token,refresh_token,expires_at,user:u});
        window.history.replaceState({},document.title,window.location.pathname);
        return sbAposLogin();
      }
    }
  }
  sbMostrarLogin();
}
function sbMostrarLogin(){ $('#page-login').classList.add('show'); $('#page-sem-acesso').classList.remove('show'); }
async function sbAposLogin(){
  $('#page-login').classList.remove('show');
  const email=_sbSession.user.email;
  let data=null;
  try{ const r=await sbFetch(`${SB_URL}/rest/v1/allowed_users?email=eq.${encodeURIComponent(email)}&select=email`,{headers:sbHeaders()}); if(r.ok) data=await r.json(); }catch(e){}
  if(!Array.isArray(data)||!data.length){
    $('#page-sem-acesso').classList.add('show');
    $('#sem-acesso-email').textContent=`Sessão iniciada como ${email}. Esta conta ainda não tem acesso.`;
    return;
  }
  $('#page-sem-acesso').classList.remove('show');
  $('#btnAdmin').style.display=isAdmin()?'grid':'none';
  await carregar(true);
  if(isAdmin()) refreshAdminBadge();
}
function sbLoginGoogle(){ window.location.href=`${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.href.split('#')[0])}`; }
async function sbSolicitarAcesso(){
  if(!_sbSession) return;
  const btn=$('#btn-solicitar'), btnV=$('#btn-verificar'), status=$('#solicitar-status');
  btn.disabled=true; btn.textContent='A enviar…';
  try{
    const r=await sbFetch(`${SB_URL}/rest/v1/access_requests`,{method:'POST',headers:sbHeaders({'Prefer':'return=minimal'}),body:JSON.stringify({email:_sbSession.user.email})});
    if(r.ok||r.status===409){
      status.style.color='var(--vem)';
      status.textContent=r.status===409?'✓ Pedido já registado. Aguarda aprovação.':'✓ Pedido enviado! Aguarda aprovação.';
      btn.style.display='none'; btnV.style.display=''; return;
    }
    let msg='HTTP '+r.status; try{const j=await r.json(); msg=j.message||msg;}catch(_){}
    if(r.status===401) msg='Sessão expirada — sai e volta a entrar.';
    status.style.color='var(--nao)'; status.textContent='Erro: '+msg;
    btn.disabled=false; btn.textContent='Solicitar acesso';
  }catch(e){ status.style.color='var(--nao)'; status.textContent='Erro de ligação.'; btn.disabled=false; btn.textContent='Solicitar acesso'; }
}
async function sbVerificarAcesso(){
  const btn=$('#btn-verificar'), status=$('#solicitar-status');
  btn.disabled=true; btn.textContent='A verificar…';
  await sbAposLogin();
  btn.disabled=false; btn.textContent='🔄 Verificar acesso';
  if($('#page-sem-acesso').classList.contains('show')){ status.style.color='var(--dim)'; status.textContent='Acesso ainda não aprovado. Tenta mais tarde.'; }
}
function sbLogout(){ localStorage.removeItem(SESSION_KEY); _sbSession=null; window.location.reload(); }

async function refreshAdminBadge(){
  if(!isAdmin()) return;
  try{ const reqs=await sbReq('GET','access_requests?select=email'); const n=(reqs||[]).length;
    const b=$('#admBadge'); b.textContent=n; b.style.display=n?'grid':'none'; }catch(e){}
}
function abrirAdmin(){
  openSheet(`<h2>Pedidos de acesso</h2>
    <div id="adm-pedidos-list"><p class="hint" style="margin:0">A carregar…</p></div>
    <div class="sheet-actions" style="margin-top:14px"><button class="btn ghost" onclick="closeSheet()">Fechar</button></div>`);
  sbRenderPedidos();
}
async function sbRenderPedidos(){
  const box=$('#adm-pedidos-list'); if(!box) return;
  try{
    const reqs=await sbReq('GET','access_requests?select=email,requested_at&order=requested_at.asc');
    if(!reqs||!reqs.length){ box.innerHTML='<p class="hint" style="margin:0">Sem pedidos pendentes.</p>'; return; }
    box.innerHTML=reqs.map(rq=>`<div class="adm-row">
      <span class="adm-email">${esc(rq.email)}</span>
      <button class="qbtn v" title="Aprovar" onclick="sbAprovar('${esc(rq.email)}')">✓</button>
      <button class="qbtn n" title="Recusar" onclick="sbRecusar('${esc(rq.email)}')">✗</button>
    </div>`).join('');
  }catch(e){ box.innerHTML='<p class="hint" style="margin:0">Erro a carregar pedidos.</p>'; }
}
async function sbAprovar(email){
  try{
    await sbReq('POST','allowed_users',[{email}],{Prefer:'resolution=merge-duplicates,return=minimal'});
    await sbReq('DELETE',`access_requests?email=eq.${encodeURIComponent(email)}`);
    toast('Acesso aprovado'); sbRenderPedidos(); refreshAdminBadge();
  }catch(e){ toast('Erro: '+e.message); }
}
async function sbRecusar(email){
  try{
    await sbReq('DELETE',`access_requests?email=eq.${encodeURIComponent(email)}`);
    toast('Pedido removido'); sbRenderPedidos(); refreshAdminBadge();
  }catch(e){ toast('Erro: '+e.message); }
}

/* ---------- arranque ---------- */
ensureMeta(); render(); sbInit();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
